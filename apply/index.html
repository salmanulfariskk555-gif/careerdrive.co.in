<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admission Form | Career Drive Edu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f4f8; }
        .form-card { border: 1px solid #e2e8f0; border-radius: 24px; background: white; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        input, select, textarea { width: 100%; padding: 0.85rem 1rem; border-radius: 12px; border: 1.5px solid #e2e8f0; outline: none; transition: all 0.3s; background: #f8fafc; }
        input:focus, select:focus { border-color: #f97316; background: white; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    </style>
</head> <body class="pb-20">

    <div class="bg-[#1e3a8a] pt-10 pb-24 px-6 rounded-b-[50px] shadow-lg">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <a href="https://careerdrive.co.in/" class="mb-6 bg-white/10 hover:bg-white/20 text-white px-5 py-2 rounded-full text-xs font-bold transition flex items-center border border-white/20 uppercase tracking-widest">
                <i class="fas fa-home mr-2"></i> Back to Home
            </a>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white text-center tracking-tight">ADMISSIONS OPEN 2026–27</h1>
            <p class="text-blue-200 mt-2 text-sm font-medium opacity-90">Career Drive Edu - Your Trusted Admission Partner</p>
        </div>
    </div>

    <div class="container mx-auto px-4 -mt-12">
        <form id="fullAdmissionForm" class="max-w-3xl mx-auto space-y-6">

            <div class="form-card">
                <h3 class="text-lg font-extrabold text-[#1e3a8a] mb-6 flex items-center">
                    <i class="fas fa-user-circle mr-3 text-orange-500"></i> PERSONAL INFORMATION
                </h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label>Student Full Name *</label>
                        <input type="text" id="name" required placeholder="Full name as per certificates">
                    </div>
                    <div>
                        <label>Father's/Guardian's Name</label>
                        <input type="text" id="parent" placeholder="Parent Name">
                    </div>
                    <div>
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                    <div>
                        <label>WhatsApp Number *</label>
                        <input type="tel" id="whatsapp" required placeholder="+91">
                    </div>
                    <div>
                        <label>Alternative Number (Parent)</label>
                        <input type="tel" id="altPhone" placeholder="In case of emergency">
                    </div>
                    <div class="md:col-span-2">
                        <label>Gender</label>
                        <div class="flex gap-6 mt-2">
                            <label class="flex items-center font-bold text-slate-700 cursor-pointer">
                                <input type="radio" name="gender" value="Male" class="w-4 h-4 mr-2" checked> Male
                            </label>
                            <label class="flex items-center font-bold text-slate-700 cursor-pointer">
                                <input type="radio" name="gender" value="Female" class="w-4 h-4 mr-2"> Female
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3 class="text-lg font-extrabold text-[#1e3a8a] mb-6 flex items-center">
                    <i class="fas fa-graduation-cap mr-3 text-orange-500"></i> ACADEMIC HISTORY
                </h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label>Last Studied School / College Name</label>
                        <input type="text" id="prevInst" placeholder="Name of school/college">
                    </div>
                    <div>
                        <label>12th or Degree Score (%) *</label>
                        <input type="text" id="marks" required placeholder="Percentage or CGPA">
                    </div>
                    <div>
                        <label>Year of Passing</label>
                        <select id="passYear">
                            <option>2025 (Appearing)</option>
                            <option>2024</option>
                            <option>2023</option>
                            <option>Before 2023</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label>Entrance Rank (NEET/KEAM/JEE if any)</label>
                        <input type="text" id="rank" placeholder="Enter your rank/score">
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3 class="text-lg font-extrabold text-[#1e3a8a] mb-6 flex items-center">
                    <i class="fas fa-university mr-3 text-orange-500"></i> PREFERENCES
                </h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div>
                        <label>Interested Course Stream *</label>
                        <select id="stream" required>
                            <option value="">Select Stream</option>
                            <option>Medical (MBBS/BDS/BAMS)</option>
                            <option>Engineering (B.Tech/BE)</option>
                            <option>Nursing / Allied Health</option>
                            <option>Management (MBA/BBA)</option>
                            <option>Arts & Science</option>
                        </select>
                    </div>
                    <div>
                        <label>Target Course Name</label>
                        <input type="text" id="course" placeholder="e.g. B.Tech Computer Science">
                    </div>
                    <div>
                        <label>Preferred Study Location *</label>
                        <select id="location" required>
                            <option value="">Select State</option>
                            <option>Kerala</option>
                            <option>Karnataka (Bangalore/Mangalore)</option>
                            <option>Tamil Nadu</option>
                            <option>North India (Delhi/Pune)</option>
                            <option>Abroad (Foreign University)</option>
                            <option>Anywhere in India</option>
                        </select>
                    </div>
                    <div>
                        <label>Annual Fee Budget (Approx)</label>
                        <input type="text" id="budget" placeholder="e.g. 2 Lakhs - 4 Lakhs">
                    </div>
                </div>
            </div>

            <div class="form-card">
                <label>Permanent Address</label>
                <textarea id="address" rows="3" placeholder="Full address with pincode"></textarea>
            </div>

            <button type="submit" class="w-full bg-orange-500 hover:bg-[#1e3a8a] text-white font-black py-5 rounded-2xl shadow-xl shadow-orange-500/30 transition-all active:scale-95 text-xl uppercase tracking-[2px]">
                Submit Application <i class="fab fa-whatsapp ml-2"></i>
            </button>

        </form>
    </div>

    <div id="thankYouModal" class="hidden fixed inset-0 bg-[#0f172a]/95 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[40px] p-10 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-[#1e3a8a] mb-2">Success!</h2>
            <p class="text-gray-500 mb-8 font-medium">Your detailed application has been sent. Please send your marksheets on WhatsApp now for verification.</p>
            <a href="https://careerdrive.co.in/" class="inline-block bg-[#1e3a8a] text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-orange-500 transition shadow-lg">Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('fullAdmissionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const getValue = (id) => document.getElementById(id).value || "Not Provided";

            const data = {
                name: getValue('name'),
                parent: getValue('parent'),
                dob: getValue('dob'),
                whatsapp: getValue('whatsapp'),
                altPhone: getValue('altPhone'),
                gender: document.querySelector('input[name="gender"]:checked') ? document.querySelector('input[name="gender"]:checked').value : "Not Specified",
                prevInst: getValue('prevInst'),
                marks: getValue('marks'),
                passYear: getValue('passYear'),
                rank: getValue('rank'),
                stream: getValue('stream'),
                course: getValue('course'),
                location: getValue('location'),
                budget: getValue('budget'),
                address: getValue('address')
            };

            const myWhatsApp = "919495209080";

            const messageText = `*🌟 NEW ADMISSION APPLICATION 2026 🌟*\n` +
                                `----------------------------\n` +
                                `*👤 PERSONAL INFO*\n` +
                                `• Name: ${data.name}\n` +
                                `• Parent: ${data.parent}\n` +
                                `• Gender: ${data.gender}\n` +
                                `• DOB: ${data.dob}\n` +
                                `• WhatsApp: ${data.whatsapp}\n` +
                                `• Alt Phone: ${data.altPhone}\n\n` +
                                `*🎓 ACADEMIC INFO*\n` +
                                `• Institution: ${data.prevInst}\n` +
                                `• Marks: ${data.marks}\n` +
                                `• Pass Year: ${data.passYear}\n` +
                                `• Rank: ${data.rank}\n\n` +
                                `*🎯 PREFERENCES*\n` +
                                `• Stream: ${data.stream}\n` +
                                `• Course: ${data.course}\n` +
                                `• Location: ${data.location}\n` +
                                `• Budget: ${data.budget}\n\n` +
                                `*📍 ADDRESS*\n` +
                                `${data.address}\n` +
                                `----------------------------\n` +
                                `_Student is waiting for document verification._`;

            const encodedMessage = encodeURIComponent(messageText);
            window.open(`https://wa.me/${myWhatsApp}?text=${encodedMessage}`, '_blank');

            const modal = document.getElementById('thankYouModal');
            if(modal) {
                modal.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
